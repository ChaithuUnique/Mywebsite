<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Chicks Farm</title>

<style>
body {margin:0; font-family:Arial; background:#f5f5f5;}
header {background:#222; color:#fff; text-align:center; padding:40px;}
.section {padding:30px; text-align:center;}
.products {display:flex; flex-wrap:wrap; justify-content:center; gap:20px;}
.card {background:#fff; padding:20px; border-radius:10px; width:250px;}
.order-box {background:#fff; padding:20px; max-width:400px; margin:auto;}
input, select {width:90%; padding:10px; margin:10px 0;}
button {background:#28a745; color:white; padding:12px; border:none; border-radius:6px;}
</style>
</head>

<body>

<header>
<h1>Fresh Chicks Farm</h1>
</header>

<div class="section">

<div class="products">
<div class="card">
<h3>Broiler Chicks</h3>
<p>Price: <span id="broilerPrice">Loading...</span></p>
<p>Stock: <span id="broilerStock">Loading...</span></p>
</div>

<div class="card">
<h3>Layer Chicks</h3>
<p>Price: <span id="layerPrice">Loading...</span></p>
<p>Stock: <span id="layerStock">Loading...</span></p>
</div>

<div class="card">
<h3>Country Chicks</h3>
<p>Price: <span id="countryPrice">Loading...</span></p>
<p>Stock: <span id="countryStock">Loading...</span></p>
</div>
</div>

</div>

<div class="section">
<h2>Place Order</h2>

<div class="order-box">

<select id="type" onchange="calculateTotal()">
<option>Broiler Chicks</option>
<option>Layer Chicks</option>
<option>Country Chicks</option>
</select>

<input type="number" id="qty" placeholder="Enter Quantity" oninput="calculateTotal()">

<p>Total: <span id="totalPrice">₹0</span></p>
<p>Advance: <span id="advance">₹0</span></p>

<input type="text" id="location" placeholder="Enter location">

<input type="file" id="screenshot" accept="image/*">

<a id="upiLink" href="#">
<button type="button">Pay Advance</button>
</a>

<br><br>

<button id="orderBtn" onclick="placeOrder()">Confirm Order</button>

</div>
</div>

<script>
let settings = {};

// LOAD DATA FROM SHEETDB
async function loadData() {
  const res = await fetch("https://sheetdb.io/api/v1/r1fitl072sayx");
  const data = await res.json();

  data.forEach(item => {
    if (item.type === "Broiler Chicks") {
      settings.broiler = Number(item.price);
      document.getElementById("broilerPrice").innerText = "₹" + item.price;
      document.getElementById("broilerStock").innerText = item.stock;
    }
    if (item.type === "Layer Chicks") {
      settings.layer = Number(item.price);
      document.getElementById("layerPrice").innerText = "₹" + item.price;
      document.getElementById("layerStock").innerText = item.stock;
    }
    if (item.type === "Country Chicks") {
      settings.country = Number(item.price);
      document.getElementById("countryPrice").innerText = "₹" + item.price;
      document.getElementById("countryStock").innerText = item.stock;
    }
    if (item.setting === "advance_payment") {
      settings.advance = Number(item.value);
    }
  });
}

// CALCULATE TOTAL + ADVANCE
function calculateTotal() {
  let type = document.getElementById("type").value;
  let qty = Number(document.getElementById("qty").value);

  if (!qty || qty <= 0) {
    document.getElementById("totalPrice").innerText = "₹0";
    document.getElementById("advance").innerText = "₹0";
    return;
  }

  if (type === "Broiler Chicks" && qty < 100) {
    alert("Minimum 100 required");
    return;
  }

  if (type === "Country Chicks" && qty < 50) {
    alert("Minimum 50 required");
    return;
  }

  let price = settings.broiler;
  if (type === "Layer Chicks") price = settings.layer;
  if (type === "Country Chicks") price = settings.country;

  let total = price * qty;
  let advanceAmt = (total * settings.advance) / 100;

  document.getElementById("totalPrice").innerText = "₹" + total;
  document.getElementById("advance").innerText = "₹" + advanceAmt;

  document.getElementById("upiLink").href =
    `upi://pay?pa=yourupiid@upi&pn=ChicksFarm&am=${advanceAmt}&cu=INR`;
}

// UPLOAD IMAGE TO CLOUDINARY
async function uploadImage() {
  let file = document.getElementById("screenshot").files[0];

  if (!file) {
    alert("Please upload payment screenshot");
    return null;
  }

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "YOUR_UPLOAD_PRESET");

  let res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload", {
    method: "POST",
    body: formData
  });

  let data = await res.json();
  return data.secure_url;
}

// PLACE ORDER
async function placeOrder() {

  let btn = document.getElementById("orderBtn");
  btn.disabled = true;

  let type = document.getElementById("type").value;
  let qty = document.getElementById("qty").value;
  let location = document.getElementById("location").value;
  let total = document.getElementById("totalPrice").innerText;
  let advance = document.getElementById("advance").innerText;

  if (!location) {
    alert("Enter location");
    btn.disabled = false;
    return;
  }

  let imageURL = await uploadImage();
  if (!imageURL) {
    btn.disabled = false;
    return;
  }

  // SAVE TO SHEET
  await fetch("https://sheetdb.io/api/v1/r1fitl072sayx", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      data: [{
        type, qty, total, advance, location,
        screenshot: imageURL,
        date: new Date().toLocaleString()
      }]
    })
  });

  // WHATSAPP MESSAGE
  let msg = `Order Details:%0AType: ${type}%0AQty: ${qty}%0ATotal: ${total}%0AAdvance: ${advance}%0ALocation: ${location}%0AScreenshot: ${imageURL}`;

  window.location.href = "https://wa.me/YOUR_PHONE_NUMBER?text=" + msg;
}

window.onload = loadData;
</script>

</body>
</html>
