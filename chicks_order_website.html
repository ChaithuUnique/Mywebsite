<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Chicks Farm</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#222; color:#fff; text-align:center; padding:40px;}
.section {padding:20px; text-align:center;}
.card {background:#fff; padding:20px; margin:10px auto; max-width:400px; border-radius:10px;}
input, select {width:90%; padding:10px; margin:10px 0;}
button {background:#28a745; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer;}
</style>

<script>
function placeOrder(){
  let type = document.getElementById("type").value;
  let qty = document.getElementById("qty").value;
  let location = document.getElementById("location").value;

  let message = `Order Details:%0AType: ${type}%0AQuantity: ${qty}%0ALocation: ${location}`;

  // Replace with your number
  let whatsapp = "https://wa.me/919876543210?text=" + message;

  window.location.href = whatsapp;
}
</script>

</head>

<body>

<header>
<h1>Fresh Chicks Farm</h1>
<p>Order Chicks Online & Pay Advance</p>
</header>

<div class="section">
<div class="card">
<h2>Place Your Order</h2>

<select id="type">
<option>Broiler Chicks</option>
<option>Layer Chicks</option>
<option>Country Chicks</option>
</select>

<input type="number" id="qty" placeholder="Enter Quantity">

<input type="text" id="location" placeholder="Enter Delivery Location">

<p>Advance Payment: ₹500</p>

<a href="upi://pay?pa=yourupiid@upi&pn=ChicksFarm&am=500&cu=INR">
<button>Pay Advance</button>
</a>

<br><br>

<button onclick="placeOrder()">Confirm Order</button>

</div>
</div>

</body>
</html>
